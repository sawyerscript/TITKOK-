<!DOCTYPE html>
<html>
<head>
    <title>STATUS_IDLE</title>
    <script src="https://cdn.jsdelivr.net/bundle/npm/tiktok-live-connector@0.9.1"></script>
    <style>
        body { background: #111; color: white; font-family: sans-serif; text-align: center; padding: 50px; }
        .btn { 
            padding: 25px 50px; font-size: 24px; cursor: pointer; 
            background: #ff0050; color: white; border: none; border-radius: 15px;
            font-weight: bold; box-shadow: 0 4px 15px rgba(255, 0, 80, 0.4);
        }
        #status { color: #00f2ea; font-size: 20px; margin-top: 20px; }
    </style>
</head>
<body>
    <button class="btn" onclick="triggerTest()">SEND TEST ROSE</button>
    <h1>TikTok Bridge: @hybetember04</h1>
    <p>Status: <span id="status">Checking Script...</span></p>

    <script>
        const username = "hybetember04";
        
        // This version uses a slightly different name when loaded via CDN bundle
        window.onload = function() {
            if (!window.TikTokLiveConnector) {
                document.getElementById('status').innerText = "Script Error: Connector not found.";
                return;
            }

            let connection = new TikTokLiveConnector.WebcastPushConnection(username);

            function triggerRose() {
                document.title = "STATUS_ROSE";
                document.getElementById('status').innerText = "ROSE TRIGGERED!";
                document.body.style.backgroundColor = "#ff0050";
                
                setTimeout(() => {
                    document.title = "STATUS_IDLE";
                    document.getElementById('status').innerText = "Watching Live...";
                    document.body.style.backgroundColor = "#111";
                }, 3000);
            }

            window.triggerTest = function() {
                triggerRose();
            };

            connection.connect().then(state => {
                document.getElementById('status').innerText = "CONNECTED TO " + username;
            }).catch(err => {
                document.getElementById('status').innerText = "OFFLINE OR NOT FOUND";
            });

            connection.on('gift', data => {
                if (data.giftName === "Rose") {
                    triggerRose();
                }
            });
        };
    </script>
</body>
</html>
