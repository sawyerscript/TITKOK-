<!DOCTYPE html>
<html>
<head>
    <title>TikTok Discord Bridge</title>
    <script src="https://cdn.jsdelivr.net/npm/tiktok-live-connector@latest/dist/browser-index.min.js"></script>
</head>
<body>
    <h1 id="state">Connecting...</h1>
    <script>
        const username = "hybetember04";
        // We use the Hyra proxy so Roblox can actually communicate with it
        const webhookUrl = "https://hooks.hyra.io/api/webhooks/1487331088463429662/BSljjVCBYLhhQWT6BuNMGG0nn0dg4pYPp54YaMvfV3KVA-w98Y4Zdy28rARgmc_KTZUY";

        const connection = new TikTokLiveConnector.TikTokLiveConnection(username);
        connection.connect().then(() => { document.getElementById('state').innerText = "LIVE: " + username; });

        connection.on('gift', data => {
            if (data.giftName === "Rose") {
                fetch(webhookUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ content: "ROSE_SIGNAL" })
                });
            }
        });
    </script>
</body>
</html>
